services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_api_stage:/var/lib/postgresql/data
    networks:
      - core-net-stage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_api_stage:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--notify-keyspace-events", "Egx"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - core-net-stage
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-stage:
    build: .
    restart: unless-stopped
    networks:
      - core-net-stage
    ports:
      - 8000:8000
    volumes:
      # Use docker-specific config file with postgres hostname
      - ./configs/config.docker.yaml:/app/configs/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/configs/config.yaml

volumes:
  postgres_data_api_stage:
  redis_data_api_stage:

networks:
  core-net-stage:
    external: true
