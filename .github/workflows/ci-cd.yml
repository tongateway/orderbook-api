name: CI/CD (build & deploy)

on:
  push:
    branches: [ main, stage ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # нужно для push в GHCR c GITHUB_TOKEN

env:
  OWNER: ${{ github.repository_owner }}
  REPO:  ${{ github.event.repository.name }}
  BRANCH: ${{ github.ref_name }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build:
    name: Build & Push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize lowercase image name
        id: normalize
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          BRANCH="${GITHUB_REF_NAME}"
          IMAGE="${{ steps.normalize.outputs.image }}"
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Computed tags:"
          echo " - ${IMAGE}:${BRANCH}-latest"
          echo " - ${IMAGE}:${BRANCH}-${SHORT_SHA}"

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.branch }}-latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.short_sha }}

  deploy:
    name: Deploy on server (compose pull & up)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_PASS: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: OWNER,REPO,BRANCH,GHCR_USER,GHCR_PASS
          script: |
            OWNER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
            REPO=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${OWNER}/${REPO}"
            IMAGE_TAG="${BRANCH}-latest"

            BASE_DIR="/srv/apps/${REPO}"
            if [ "$BRANCH" = "stage" ]; then
              TARGET_DIR="${BASE_DIR}-stage"
            else
              TARGET_DIR="${BASE_DIR}"
            fi
            COMPOSE_PROJECT_NAME="${REPO}-${BRANCH}"

            echo "Repo: ${OWNER}/${REPO}"
            echo "Branch: $BRANCH"
            echo "Target dir: $TARGET_DIR"
            echo "Compose project: $COMPOSE_PROJECT_NAME"
            echo "Will use image: ${IMAGE}:${IMAGE_TAG}"

            echo "=== GHCR Login ==="
            echo "$GHCR_PASS" | docker login ghcr.io -u "$GHCR_USER" --password-stdin || { echo "FATAL: docker login failed"; exit 1; }

            cd "$TARGET_DIR" || { echo "FATAL: directory $TARGET_DIR not found"; exit 1; }

            export COMPOSE_PROJECT_NAME
            export IMAGE_REGISTRY_PATH="${IMAGE}"
            export IMAGE_TAG="${IMAGE_TAG}"

            echo "=== Pulling image ==="
            docker compose pull || { echo "FATAL: docker compose pull failed"; exit 1; }

            echo "=== Starting containers ==="
            docker compose up -d --force-recreate || { echo "FATAL: docker compose up failed"; exit 1; }

            echo "=== Container status ==="
            docker compose ps

            RUNNING=$(docker compose ps --status running -q | wc -l)
            TOTAL=$(docker compose ps -q | wc -l)
            if [ "$RUNNING" -lt "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
              echo "FATAL: Not all containers are running ($RUNNING/$TOTAL)"
              docker compose logs --tail=50
              exit 1
            fi
            echo "All $RUNNING containers are running"
